name: Build .pyd / .so files

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install cython setuptools

      - name: Build extension
        run: python build_pyd.py

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pyd-win-${{ matrix.python-version }}
          path: pywxauto/*.cp*.pyd

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pyd-macos-${{ matrix.python-version }}
          path: pywxauto/*.cpython*.so

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-pyd
          pattern: pyd-*
          merge-multiple: true

      - name: List built files
        run: ls -lh all-pyd/

      - name: Create release archive
        run: |
          mkdir -p release
          cp all-pyd/*.pyd all-pyd/*.so release/ 2>/dev/null || true
          cd release && zip ../pywxauto-extensions-all.zip *

      - name: Upload combined archive
        uses: actions/upload-artifact@v4
        with:
          name: pywxauto-extensions-all
          path: pywxauto-extensions-all.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pywxauto-extensions-all.zip
            release/*
